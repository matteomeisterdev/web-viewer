<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=Edge" />
<title>Ionto Dashboard Add-in</title>

<!-- Required by every Office Add-in, even ones that never call an Office.js API -->
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffffff;
    font-family: "Segoe UI", Arial, sans-serif;
  }

  /* The frame is sized/scaled in JS. transform-origin top-left so scaling
     keeps the top-left pinned to the add-in surface corner. */
  #dashboard-frame {
    position: fixed;
    top: 0;
    left: 0;
    border: 0;
    display: block;
    transform-origin: top left;
  }

  #fallback {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    padding: 24px;
    text-align: center;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: #323130;
  }

  #fallback.visible {
    display: flex;
  }

  #fallback h1 {
    font-size: 18px;
    margin: 0 0 8px;
  }

  #fallback p {
    font-size: 13px;
    color: #605e5c;
    margin: 0 0 4px;
    max-width: 480px;
  }

  #fallback a {
    color: #0078d4;
    word-break: break-all;
  }
</style>
</head>
<body>

  <!--
    The dashboard URL comes from (in priority order):
      1. ?src=<url> query param on this page
      2. the DEFAULT_DASHBOARD_URL constant below
    Change DEFAULT_DASHBOARD_URL and redeploy to permanently change the target,
    or point the manifest's SourceLocation at this page with a ?src= param to
    override without editing this file.

    Zoom / responsiveness:
      The dashboard has a full-height left sidebar, so its layout is
      height-constrained: if the logical viewport is too short, the sidebar
      gets its own scrollbar. We therefore render the iframe at a fixed
      *logical height* (tall enough for the whole sidebar) and CSS-scale it to
      fill the add-in surface; the logical width flexes to fill horizontally
      (the dashboard is responsive across widths).
      Tune with a query param on THIS page:
        ?h=<px>    logical height to render at (default 900). Bigger = more
                   vertical content fits / everything smaller (zoomed out);
                   smaller = zoomed in.
  -->
  <iframe id="dashboard-frame" title="Live dashboard" allow="fullscreen"></iframe>

  <div id="fallback">
    <h1>Dashboard didn't load</h1>
    <p>
      The embedded page may be blocking iframes (X-Frame-Options / CSP
      frame-ancestors), or the network request failed.
    </p>
    <p>Target URL: <a id="fallback-url" href="#" target="_blank" rel="noopener"></a></p>
  </div>

<script>
  (function () {
    // 1. Change this constant to permanently change the embedded dashboard.
    // No mf_run pinned on purpose: the app defaults the events view to the
    // most recent run, so the embed always shows the latest data on demo day.
    var DEFAULT_DASHBOARD_URL =
      "https://ionto-dashboard.fly.dev/?page=microfluidic&mf_view=events&demo_token=5q1cJ-V6B2zSAh1Jr8AdlLaTJoHfTe42_zRl5wR3_pk";

    var FALLBACK_TIMEOUT_MS = 6000;

    function getTargetUrl() {
      var src = new URLSearchParams(window.location.search).get("src");
      if (!src) {
        return DEFAULT_DASHBOARD_URL;
      }
      try {
        var parsed = new URL(src, window.location.href);
        if (parsed.protocol !== "https:") {
          console.warn("Ignoring non-HTTPS src param:", src);
          return DEFAULT_DASHBOARD_URL;
        }
        return parsed.href;
      } catch (e) {
        console.warn("Ignoring invalid src param:", src);
        return DEFAULT_DASHBOARD_URL;
      }
    }

    var params = new URLSearchParams(window.location.search);

    // Logical height the iframe is rendered at before scaling. Tall enough
    // that the full-height sidebar never needs its own scrollbar; the whole
    // thing is then scaled to fill the surface.
    var LOGICAL_HEIGHT = parseInt(params.get("h"), 10);
    if (!LOGICAL_HEIGHT || LOGICAL_HEIGHT < 320) {
      LOGICAL_HEIGHT = 900;
    }

    var targetUrl = getTargetUrl();
    var frame = document.getElementById("dashboard-frame");
    var fallback = document.getElementById("fallback");
    var fallbackUrl = document.getElementById("fallback-url");
    fallbackUrl.href = targetUrl;
    fallbackUrl.textContent = targetUrl;

    // Render the iframe at LOGICAL_HEIGHT so the full-height sidebar always
    // fits, then scale it to fill the add-in surface height. The logical width
    // is set so that, after scaling, it fills the surface exactly — no
    // letterboxing and no scrollbars. The dashboard reflows to that width.
    function fit() {
      var vw = window.innerWidth || document.documentElement.clientWidth;
      var vh = window.innerHeight || document.documentElement.clientHeight;
      if (!vw || !vh) return;

      var scale = vh / LOGICAL_HEIGHT;
      frame.style.height = LOGICAL_HEIGHT + "px";
      frame.style.width = Math.round(vw / scale) + "px";
      frame.style.transform = "scale(" + scale + ")";
    }

    window.addEventListener("resize", fit);
    frame.addEventListener("load", fit);
    fit();

    var loaded = false;

    function showFallback() {
      if (loaded) return;
      frame.style.display = "none";
      fallback.classList.add("visible");
    }

    frame.addEventListener("load", function () {
      // A blocked frame-ancestors/X-Frame-Options response still fires 'load'
      // in most browsers (it loads an error/blank document), so 'load' alone
      // isn't reliable proof of success. We still use it as a positive signal
      // and rely on the timeout below to catch the negative case.
      loaded = true;
      fallback.classList.remove("visible");
      frame.style.display = "block";
    });

    frame.addEventListener("error", showFallback);

    // If nothing has loaded within the timeout, assume it was blocked.
    setTimeout(function () {
      if (!loaded) {
        showFallback();
      }
    }, FALLBACK_TIMEOUT_MS);

    frame.src = targetUrl;

    // Reload to the latest run whenever the add-in becomes visible again — e.g.
    // navigating back to this slide, or entering Slide Show. targetUrl pins no
    // mf_run, so the app re-resolves to the most recent run on each reload,
    // guaranteeing the newest data is on screen when you present the slide.
    // Debounced so transient focus changes don't cause a reload storm.
    var lastReload = Date.now();
    function reloadToLatest() {
      if (Date.now() - lastReload < 3000) return;
      lastReload = Date.now();
      loaded = false;
      frame.src = targetUrl;
    }
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") reloadToLatest();
    });
    window.addEventListener("pageshow", function (e) {
      if (e.persisted) reloadToLatest();
    });

    if (window.Office && Office.onReady) {
      Office.onReady();
    }
  })();
</script>
</body>
</html>
